spring.application.name=pfe
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ============= MySQL =============
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pfe?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.connection-timeout=5000

# ============= JPA =============
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ============= Serveur =============
server.port=${SERVER_PORT:8080}

# ============= Email =============
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.email.simulated=false
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.thread-name-prefix=email-task-

# ============= URLs =============
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.main.allow-bean-definition-overriding=true

# ============= JWT =============
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
jwt.access-token-expiration-ms=86400000
jwt.activation-token-expiration-ms=604800000
jwt.clock-skew-seconds=60

# ============= Thymeleaf =============
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ============= Logging =============
logging.level.com.example.pfe=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.pfe.config.JwtAuthenticationFilter=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.zaxxer.hikari.HikariPool=DEBUG

# ============= File Upload =============
app.upload.dir=${UPLOAD_DIR:uploads/avatars}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============= Groq / LangChain4j =============
groq.api.key=${GROQ_API_KEY:disabled}
langchain4j.open-ai.chat-model.base-url=https://api.groq.com/openai/v1
langchain4j.open-ai.chat-model.api-key=${groq.api.key}
langchain4j.open-ai.chat-model.model-name=llama-3.3-70b-versatile
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=1024

# ============= Ollama =============
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=mistral
langchain4j.ollama.chat-model.temperature=0.7
langchain4j.ollama.embedding-model.model-name=nomic-embed-text

# ============= ChromaDB =============
langchain4j.chroma.url=http://localhost:8000
langchain4j.chroma.collection-name=pdf-documents
chroma.enabled=false

# ============= Dev Tools =============
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true