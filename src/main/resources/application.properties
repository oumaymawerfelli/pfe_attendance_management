spring.application.name=pfe

# ============= MySQL =============
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pfe?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============= JPA =============
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ============= Serveur =============
server.port=${SERVER_PORT:8080}

# ============= Email =============
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:oumawerf12@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.email.simulated=false
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.thread-name-prefix=email-task-

# ============= URLs =============
app.frontend.url=${FRONTEND_URL:http://localhost:4200}
app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.main.allow-bean-definition-overriding=true

# ============= JWT =============
app.jwt.secret=${JWT_SECRET:NSI88IzYFdGzL1tO+Lzk3pVDg89tut7r38K9vwHXx28=}
app.jwt.expiration=86400000

# ============= Thymeleaf =============
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

jwt.access-token-expiration-ms=86400000
jwt.activation-token-expiration-ms=604800000
jwt.clock-skew-seconds=60

# ============= Logging =============
logging.level.com.example.pfe=DEBUG
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.example.pfe.config.JwtAuthenticationFilter=DEBUG
logging.level.org.springframework.security=DEBUG

# ============= File Upload =============
app.upload.dir=${UPLOAD_DIR:uploads/avatars}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB